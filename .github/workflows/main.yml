name: Deploy Laravel to InfinityFree via FTP

on:
  push:
    branches:
      - main # Robot akan berjalan setiap ada perubahan di branch 'main'

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Ambil Kode Terbaru dari GitHub
      uses: actions/checkout@v4
    
    - name: Proses Upload ke InfinityFree
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: htdocs/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/vendor/**
          .env
          .env.example
